- name: Reload Apache configuration
  ansible.builtin.systemd:
    name: apache2
    state: reloaded

- name: Restart Apache
  ansible.builtin.systemd:
    name: apache2
    state: restarted

- name: Restart MariaDB
  ansible.builtin.systemd:
    name: mysql
    state: restarted

- name: Restart PHP 8.1 FPM
  ansible.builtin.systemd:
    name: php8.1-fpm
    state: restarted
    daemon_reload: yes
